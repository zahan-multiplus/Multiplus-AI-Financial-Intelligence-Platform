<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multiplus AI — Architecture Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      position: relative;
      font-family: Inter, system-ui, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background: #0a0e1a;
      background-image: url("codioful-formerly-gradienta-OzfD79w8ptA-unsplash.jpg");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #e6eefc;
      min-height: 100vh;
      line-height: 1.6;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(8, 12, 25, 0.55);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      z-index: -1;
    }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 6px;
    }
    .search-bar {
      width: 100%;
      margin-bottom: 24px;
      position: relative;
    }
    .search-bar input {
      width: 100%;
      padding: 10px 12px 10px 36px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
      color: white;
      font-size: 14px;
      outline: none;
      box-sizing: border-box;
    }
    .search-bar input::placeholder {
      color: rgba(255, 255, 255, 0.45);
    }
    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.55;
      pointer-events: none;
    }
    /* Two-column layout: sidebar (left) + content (right). No right panel. */
    .main {
      display: flex;
      gap: 80px;
      padding: 40px 48px 60px;
      align-items: flex-start;
      min-height: 100vh;
    }
    #nav-column {
      width: 320px;
      flex-shrink: 0;
      position: sticky;
      top: 32px;
      align-self: flex-start;
    }
    #tree-panel {
      width: 100%;
      background: transparent;
    }
    #tree-container {
      padding: 0;
      overflow: visible;
    }
    .tree, .tree ul, .tree li {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .tree li::marker { display: none; }
    .tree li::before { content: none; }
    .tree li {
      margin: 2px 0;
    }
    .tree ul { margin-left: 0; }
    /* Level indentation: strict grid */
    .tree > li { padding-left: 0; }
    .tree ul > li { padding-left: 14px; }
    .tree ul ul > li { padding-left: 28px; }
    .tree ul ul ul > li { padding-left: 42px; }
    .tree ul ul ul ul > li { padding-left: 56px; }
    .node {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 0;
      width: 100%;
      padding: 6px 0;
      min-height: 28px;
      border-radius: 0;
      background: transparent;
      border: none;
      transition: background 120ms ease;
    }
    .node:hover {
      background: rgba(255, 255, 255, 0.06);
    }
    .node.active {
      background: rgba(255, 255, 255, 0.08);
      color: #e6eefc;
    }
    .node.active .label { color: inherit; }
    .toggle {
      border: none;
      background: none;
      color: rgba(255, 255, 255, 0.5);
      padding: 0;
      width: 20px;
      min-width: 20px;
      flex-shrink: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 10px;
      cursor: pointer;
      transition: color 120ms ease;
    }
    .toggle:hover { color: rgba(255, 255, 255, 0.85); }
    .toggle.expanded { transform: rotate(90deg); }
    .tree li:not(.has-children) .toggle { visibility: hidden; min-width: 20px; width: 20px; }
    .node .label {
      flex: 1;
      min-width: 0;
      white-space: normal;
      color: #e6eefc;
      font-size: 13px;
      font-weight: 400;
      cursor: pointer;
      text-decoration: none;
      line-height: 1.4;
    }
    .node .label:hover {
      color: inherit;
    }
    /* Root + PART = bold */
    .tree > li > .node .label,
    .tree ul > li > .node .label { font-size: 14px; font-weight: 600; }
    /* Sections = normal */
    .tree ul ul > li > .node .label { font-size: 13px; font-weight: 400; }
    /* Subsections = lighter */
    .tree ul ul ul > li > .node .label { font-size: 12px; font-weight: 400; color: rgba(230, 238, 252, 0.88); }
    .tree ul ul ul ul > li > .node .label { font-size: 12px; font-weight: 400; color: rgba(230, 238, 252, 0.78); }
    .children-container {
      overflow: hidden;
      transition: height 200ms ease;
    }
    .children {
      transform-origin: top;
      transition: transform 200ms ease, opacity 180ms ease;
      opacity: 1;
      transform: scaleY(1);
    }
    .children.collapsed {
      opacity: 0;
      transform: scaleY(0);
    }
    .children-container.collapsed { height: 0; }
    #content-panel {
      flex: 1;
      min-width: 0;
      width: 100%;
      max-width: 820px;
      max-height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0;
      background: transparent;
    }
    #doc-content section {
      scroll-margin-top: 0;
      margin-bottom: 32px;
    }
    #doc-content section:last-child { margin-bottom: 0; }
    #doc-content h1 {
      margin: 0 0 24px;
      font-size: 22px;
      font-weight: 600;
      color: #e6eefc;
      line-height: 1.6;
    }
    #doc-content h2 {
      margin: 36px 0 12px;
      font-size: 18px;
      font-weight: 600;
      color: #e6eefc;
      line-height: 1.6;
    }
    #doc-content h2:first-child { margin-top: 0; }
    #doc-content h3 {
      margin: 24px 0 8px;
      font-size: 16px;
      font-weight: 600;
      color: #e6eefc;
      line-height: 1.6;
    }
    #doc-content h3:first-child { margin-top: 0; }
    #doc-content .doc-section-body {
      white-space: pre-wrap;
      font-size: 15px;
      line-height: 1.6;
      color: #e6eefc;
    }
    #doc-content .doc-node {
      display: inline-block;
      text-decoration: none;
      color: inherit;
    }
    #doc-content p {
      margin: 0 0 1em;
      font-size: 15px;
      line-height: 1.6;
      color: #e6eefc;
    }
    #doc-content ul {
      margin: 0 0 1em;
      padding-left: 1.5em;
      color: #e6eefc;
    }
    #doc-content ul.diagram-index {
      list-style: none;
      padding-left: 0;
    }
    #doc-content ul.diagram-index li {
      margin: 0.5em 0;
    }
    #doc-content li { margin: 0.25em 0; }
    #doc-content pre.diagram-block {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      font-size: 13px;
      margin: 1em 0;
      color: #e6eefc;
    }
    #doc-content figure.diagram-figure {
      margin: 1.5em 0;
      min-height: 400px;
    }
    #doc-content figure.diagram-figure img,
    #doc-content figure.diagram-figure svg {
      width: 100%;
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
    }
    #doc-content figure.diagram-figure figcaption {
      font-size: 13px;
      color: rgba(230, 238, 252, 0.8);
      margin-top: 8px;
      text-align: center;
    }
    #doc-content a {
      color: #7eb8ff;
      text-decoration: none;
    }
    #doc-content a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <!-- Two-column layout: nav (left), content (center). No right panel. -->
  <div class="main">
    <nav id="nav-column">
      <div class="search-bar">
        <span class="search-icon" aria-hidden="true">🔍</span>
        <input id="docSearch" type="text" placeholder="Search documentation..." autocomplete="off" />
      </div>
      <div id="tree-panel">
        <div id="tree-container"></div>
      </div>
    </nav>
    <main id="content-panel">
      <div id="doc-content"></div>
    </main>
  </div>
  <script src="tree.js"></script>
</body>
</html>
